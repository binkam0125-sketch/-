<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>방학 중 비근무자 유급일수 산정 (2026학년도)</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#f5f6fa;color:#222;font-size:14px}
.wrap{max-width:980px;margin:0 auto;padding:24px 16px}
h1{font-size:22px;font-weight:700;margin-bottom:6px}
.subtitle{color:#666;font-size:13px;margin-bottom:20px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.stat{background:#fff;border:1px solid #e8e8e8;border-radius:8px;padding:12px 14px}
.stat-label{font-size:11px;color:#888;margin-bottom:4px}
.stat-value{font-size:20px;font-weight:700;color:#222}
.stat-value.ok{color:#22a06b}
.stat-value.warn{color:#e5811a}
.prog-wrap{margin-bottom:14px}
.prog-bg{background:#e8e8e8;border-radius:4px;height:8px;overflow:hidden}
.prog-bar{height:100%;border-radius:4px;background:#22a06b;transition:width .3s}
.prog-bar.warn{background:#e5811a}
.prog-bar.over{background:#e53935}
.prog-info{display:flex;justify-content:space-between;font-size:12px;color:#888;margin-top:4px}
.filter-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.filter-row select{padding:5px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px;background:#fff}
.filter-row label{font-size:12px;color:#666;display:flex;align-items:center;gap:5px;cursor:pointer;margin-left:auto}
.table-wrap{background:#fff;border:1px solid #e8e8e8;border-radius:8px;overflow:auto;margin-bottom:14px;max-height:600px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f8f9fa;font-weight:600;font-size:12px;color:#555;padding:8px 10px;text-align:left;border-bottom:1px solid #e8e8e8;position:sticky;top:0;z-index:1}
td{padding:5px 10px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.vacation td{background:#f0f7ff}
tr.vacation-holiday td{background:#f0fff8}
tr.vacation-sign td{background:#fffbf0}
tr.month-header td{background:#f8f9fa;font-size:11px;font-weight:600;color:#888;padding:4px 10px}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
.badge-유급{background:#e8f5e9;color:#2e7d32}
.badge-무급{background:#f5f5f5;color:#888}
.badge-holiday{background:#e3f2fd;color:#1565c0}
.badge-sign{background:#fff8e1;color:#e65100}
.work-sel{font-size:12px;padding:3px 6px;border:1px solid #ddd;border-radius:5px;background:#fff;min-width:115px}
.work-sel:disabled{opacity:.3;cursor:not-allowed;background:#f5f5f5}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:8px 18px;border:1px solid #ddd;border-radius:6px;font-size:13px;cursor:pointer;background:#fff}
.btn:hover{background:#f0f0f0}
.btn.primary{background:#1a73e8;color:#fff;border-color:#1a73e8}
.btn.primary:hover{background:#1558b0}
.legend{display:flex;gap:14px;font-size:11px;color:#888;margin-bottom:10px;flex-wrap:wrap}
.legend span{display:flex;align-items:center;gap:4px}
.dot{width:10px;height:10px;border-radius:2px;display:inline-block}
.dot-vac{background:#d0e8ff}
.dot-hol{background:#c8f0dc}
.dot-sign{background:#fff0c0}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

<div class="wrap">
  <h1>방학 중 비근무자 유급일수 산정</h1>
  <p class="subtitle">2026학년도 · 방학 기간에 방학중근무를 입력하면 유급/무급이 자동 계산됩니다. 완료 후 엑셀 다운로드하세요.</p>

  <div class="stats">
    <div class="stat"><div class="stat-label">목표 유급일수</div><div class="stat-value">323일</div></div>
    <div class="stat"><div class="stat-label">현재 유급일수</div><div class="stat-value" id="s-current">-</div></div>
    <div class="stat"><div class="stat-label">잔여 필요일수</div><div class="stat-value" id="s-remain">-</div></div>
    <div class="stat"><div class="stat-label">방학 중 유급</div><div class="stat-value" id="s-vac">-</div></div>
  </div>

  <div class="prog-wrap">
    <div class="prog-bg"><div class="prog-bar" id="prog" style="width:0%"></div></div>
    <div class="prog-info"><span id="prog-label">계산 중...</span><span id="prog-pct"></span></div>
  </div>

  <div class="filter-row">
    <select id="month-filter" onchange="renderTable()"><option value="">전체 월</option></select>
    <select id="type-filter" onchange="renderTable()">
      <option value="">전체</option>
      <option value="학기중">학기중만</option>
      <option value="방학">방학만</option>
    </select>
    <label><input type="checkbox" id="vac-only" onchange="renderTable()"> 방학 기간만 보기</label>
  </div>

  <div class="legend">
    <span><i class="dot dot-vac"></i> 방학 기간</span>
    <span><i class="dot dot-hol"></i> 방학 중 공휴일</span>
    <span><i class="dot dot-sign"></i> 방학식</span>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:92px">일자</th>
          <th style="width:36px">요일</th>
          <th style="width:86px">공휴일</th>
          <th style="width:74px">운영구분</th>
          <th style="width:72px">방학식</th>
          <th style="width:130px">방학중근무</th>
          <th style="width:56px">구분</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="btn-row">
    <button class="btn primary" onclick="downloadExcel()">📥 엑셀 다운로드</button>
    <button class="btn" onclick="resetAll()">🔄 초기화</button>
  </div>
</div>

y": "", "operation": "겨울방학", "vacationWork": "", "vacationSign": ""}, {"date": "2027-02-24", "weekday": 3, "weekdayName": "수", "holiday": "", "operation": "겨울방학", "vacationWork": "", "vacationSign": ""}, {"date": "2027-02-25", "weekday": 4, "weekdayName": "목", "holiday": "", "operation": "겨울방학", "vacationWork": "", "vacationSign": ""}, {"date": "2027-02-26", "weekday": 5, "weekdayName": "금", "holiday": "", "operation": "겨울방학", "vacationWork": "", "vacationSign": ""}, {"date": "2027-02-27", "weekday": 6, "weekdayName": "토", "holiday": "", "operation": "겨울방학", "vacationWork": "", "vacationSign": ""}, {"date": "2027-02-28", "weekday": 7, "weekdayName": "일", "holiday": "", "operation": "겨울방학", "vacationWork": "", "vacationSign": ""}];

const data = RAW.map(r => ({...r}));
const dateIndex = {};
data.forEach((r,i) => dateIndex[r.date] = i);

function isVac(op){ return op && op !== '학기중'; }

function calcStatus(d){
  if(d.operation === '학기중') return '유급';
  if(d.holiday || d.vacationWork) return '유급';
  if(d.weekday === 7){
    const mon = new Date(d.date); mon.setDate(mon.getDate()-6);
    let cnt = 0;
    for(let i=0;i<6;i++){
      const dd = new Date(mon); dd.setDate(dd.getDate()+i);
      const key = dd.toISOString().slice(0,10);
      if(dateIndex[key]!==undefined){
        const row = data[dateIndex[key]];
        if(isVac(row.operation) && row.vacationWork) cnt++;
      }
    }
    if(cnt >= 2) return '유급';
  }
  if(d.weekday === 6){
    const mon = new Date(d.date); mon.setDate(mon.getDate()-5);
    let cntThis = 0;
    for(let i=0;i<5;i++){
      const dd = new Date(mon); dd.setDate(dd.getDate()+i);
      const key = dd.toISOString().slice(0,10);
      if(dateIndex[key]!==undefined){
        const row = data[dateIndex[key]];
        if(isVac(row.operation) && row.vacationWork) cntThis++;
      }
    }
    let cntNext = 0;
    for(let i=1;i<=7;i++){
      const dd = new Date(d.date); dd.setDate(dd.getDate()+i);
      const key = dd.toISOString().slice(0,10);
      if(dateIndex[key]!==undefined){
        const row = data[dateIndex[key]];
        if(isVac(row.operation) && row.vacationWork) cntNext++;
      }
    }
    if(cntThis >= 2 && cntNext >= 1) return '유급';
  }
  return '무급';
}

function updateStats(){
  let total=0, vacPaid=0;
  data.forEach(d => {
    if(calcStatus(d)==='유급'){ total++; if(isVac(d.operation)) vacPaid++; }
  });
  const remain = Math.max(0, TARGET-total);
  const pct = Math.min(100, Math.round(total/TARGET*100));
  const sc = document.getElementById('s-current');
  sc.textContent = total+'일';
  sc.className = 'stat-value'+(total>=TARGET?' ok':total>=TARGET*0.9?' warn':'');
  const sr = document.getElementById('s-remain');
  sr.textContent = remain+'일';
  sr.className = 'stat-value'+(remain===0?' ok':remain<10?' warn':'');
  document.getElementById('s-vac').textContent = vacPaid+'일';
  const bar = document.getElementById('prog');
  bar.style.width = pct+'%';
  bar.className = 'prog-bar'+(pct>=100?' ok':pct>=90?' warn':pct>100?' over':'');
  document.getElementById('prog-label').textContent = total+' / '+TARGET+'일';
  document.getElementById('prog-pct').textContent = pct+'%';
}

function getFiltered(){
  const mf = document.getElementById('month-filter').value;
  const tf = document.getElementById('type-filter').value;
  const vonly = document.getElementById('vac-only').checked;
  return data.filter(d => {
    if(mf && !d.date.startsWith(mf)) return false;
    if(tf==='학기중' && d.operation!=='학기중') return false;
    if(tf==='방학' && d.operation==='학기중') return false;
    if(vonly && !isVac(d.operation)) return false;
    return true;
  });
}

function renderTable(){
  const tbody = document.getElementById('tbody');
  const rows = getFiltered();
  let html = '', lastMonth = '';
  rows.forEach(d => {
    const month = d.date.slice(0,7);
    if(month !== lastMonth){
      const [y,m] = month.split('-');
      html += `<tr class="month-header"><td colspan="7">${y}년 ${parseInt(m)}월</td></tr>`;
      lastMonth = month;
    }
    const status = calcStatus(d);
    const iv = isVac(d.operation);
    let rc = '';
    if(iv && d.vacationSign) rc = 'vacation-sign';
    else if(iv && d.holiday) rc = 'vacation-holiday';
    else if(iv) rc = 'vacation';
    const dis = (!iv || !!d.holiday) ? 'disabled' : '';
    const gi = dateIndex[d.date];
    const opts = WORK_OPTIONS.map(o=>`<option value="${o}"${d.vacationWork===o?' selected':''}>${o||'—'}</option>`).join('');
    const wd = d.weekday===7?`<span style="color:#e53935">${d.weekdayName}</span>`:d.weekday===6?`<span style="color:#1a73e8">${d.weekdayName}</span>`:d.weekdayName;
    html += `<tr class="${rc}">
      <td>${d.date}</td>
      <td>${wd}</td>
      <td>${d.holiday?`<span class="badge badge-holiday">${d.holiday}</span>`:''}</td>
      <td style="font-size:11px;color:#888">${d.operation}</td>
      <td>${d.vacationSign?`<span class="badge badge-sign">${d.vacationSign}</span>`:''}</td>
      <td><select class="work-sel" ${dis} data-idx="${gi}" onchange="onWorkChange(this)">${opts}</select></td>
      <td><span class="badge badge-${status}">${status}</span></td>
    </tr>`;
  });
  tbody.innerHTML = html;
}

function onWorkChange(sel){
  const idx = parseInt(sel.dataset.idx);
  data[idx].vacationWork = sel.value;
  updateStats();
  refreshBadges();
}

function refreshBadges(){
  document.querySelectorAll('#tbody tr:not(.month-header)').forEach(tr => {
    const sel = tr.querySelector('.work-sel');
    if(!sel) return;
    const idx = parseInt(sel.dataset.idx);
    const status = calcStatus(data[idx]);
    const last = tr.querySelector('td:last-child');
    if(last) last.innerHTML = `<span class="badge badge-${status}">${status}</span>`;
  });
  updateStats();
}

function resetAll(){
  if(!confirm('입력한 내용을 모두 초기화할까요?')) return;
  data.forEach(d => d.vacationWork = '');
  updateStats();
  renderTable();
}

function buildMonthFilter(){
  const sel = document.getElementById('month-filter');
  const months = [...new Set(data.map(d=>d.date.slice(0,7)))];
  months.forEach(m => {
    const [y,mo] = m.split('-');
    const opt = document.createElement('option');
    opt.value = m;
    opt.textContent = `${y}년 ${parseInt(mo)}월`;
    sel.appendChild(opt);
  });
}

function downloadExcel(){
  const wb = XLSX.utils.book_new();
  const wsData = [['연번','일자','연도','월','요일(숫자)','요일(문자)','공휴일','운영구분','방학중근무','방학식 여부','구분']];
  data.forEach((d,i) => {
    wsData.push([
      i+1, d.date,
      d.date.slice(0,4)+'년',
      parseInt(d.date.slice(5,7))+'월',
      d.weekday, d.weekdayName,
      d.holiday, d.operation,
      d.vacationWork, d.vacationSign,
      calcStatus(d)
    ]);
  });
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols'] = [8,12,8,6,10,10,12,10,16,12,8].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws, '유급일');
  XLSX.writeFile(wb, '방학중비근무자_유급일수_산정_2026.xlsx');
}

buildMonthFilter();
updateStats();
renderTable();
</script>
